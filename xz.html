<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Книжный магазин</title>
  <!-- Подключаем Bootstrap для стилей -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Подключаем Vue 3 -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
  <!-- Корневой элемент, куда Vue будет рендерить страницу -->
  <div id="app"></div>

  <script>
    // Создаем приложение Vue
    const app = Vue.createApp({
      data() {
        return {
          books: [
            {
              id: 1,
              title: 'Мастер и Маргарита',
              author: 'Михаил Булгаков',
              price: 500,
              image: 'https://via.placeholder.com/150'
            },
            {
              id: 2,
              title: '1984',
              author: 'Джордж Оруэлл',
              price: 400,
              image: 'https://via.placeholder.com/150'
            },
            {
              id: 3,
              title: 'Преступление и наказание',
              author: 'Фёдор Достоевский',
              price: 600,
              image: 'https://via.placeholder.com/150'
            },
            {
              id: 4,
              title: 'Война и мир',
              author: 'Лев Толстой',
              price: 800,
              image: 'https://via.placeholder.com/150'
            },
            {
              id: 5,
              title: 'Гарри Поттер',
              author: 'Джоан Роулинг',
              price: 700,
              image: 'https://via.placeholder.com/150'
            }
          ],
          cart: [],
          newBook: {
            id: null,
            title: '',
            author: '',
            price: null,
            image: ''
          }
        };
      },
      computed: {
        totalPrice() {
          return this.cart.reduce((sum, item) => sum + item.price, 0);
        }
      },
      methods: {
        addBook() {
          const newId = Math.max(...this.books.map(b => b.id)) + 1;
          const book = {
            id: newId,
            title: this.newBook.title,
            author: this.newBook.author,
            price: this.newBook.price,
            image: this.newBook.image
          };
          this.books.push(book);
          this.newBook = {
            id: null,
            title: '',
            author: '',
            price: null,
            image: ''
          };
        },
        addToCart(book) {
          this.cart.push({ ...book });
        },
        removeFromCart(bookId) {
          this.cart = this.cart.filter(item => item.id !== bookId);
        },
        removeBook(bookId) {
          this.books = this.books.filter(book => book.id !== bookId);
          this.cart = this.cart.filter(item => item.id !== bookId);
        }
      },
      // Шаблон (разметка) внутри JavaScript
      template: `
        <div class="container mt-4">
          <h1 class="text-center text-md-start">Книжный магазин</h1>

          <!-- Форма для добавления книги -->
          <div class="mb-4">
            <h4>Добавить новую книгу</h4>
            <form @submit.prevent="addBook" class="row g-2">
              <div class="col-12 col-md-6">
                <input v-model="newBook.title" placeholder="Название" class="form-control" required>
              </div>
              <div class="col-12 col-md-6">
                <input v-model="newBook.author" placeholder="Автор" class="form-control" required>
              </div>
              <div class="col-12 col-md-6">
                <input v-model.number="newBook.price" type="number" placeholder="Цена" class="form-control" required>
              </div>
              <div class="col-12 col-md-6">
                <input v-model="newBook.image" placeholder="Ссылка на изображение" class="form-control">
              </div>
              <div class="col-12">
                <button type="submit" class="btn btn-success">Добавить</button>
              </div>
            </form>
          </div>

          <!-- Карточки книг -->
          <div class="row">
            <div v-for="book in books" :key="book.id" class="col-12 col-md-6 col-lg-4">
              <div class="card mb-3">
                <img :src="book.image || 'https://via.placeholder.com/150'" class="card-img-top" alt="Обложка книги">
                <div class="card-body">
                  <h5 class="card-title">{{ book.title }}</h5>
                  <p class="card-text">Автор: {{ book.author }}</p>
                  <p class="card-text">Цена: {{ book.price }} руб.</p>
                  <button @click="addToCart(book)" class="btn btn-primary">В корзину</button>
                  <button @click="removeBook(book.id)" class="btn btn-danger btn-sm ms-2">Удалить</button>
                </div>
              </div>
            </div>
          </div>

          <!-- Корзина -->
          <div v-if="cart.length > 0" class="alert alert-success">
            <h4>Корзина</h4>
            <ul class="list-group">
              <li v-for="item in cart" :key="item.id" class="list-group-item d-flex justify-content-between">
                {{ item.title }} - {{ item.price }} руб.
                <button @click="removeFromCart(item.id)" class="btn btn-sm btn-danger">Удалить</button>
              </li>
            </ul>
            <p><strong>Итого: {{ totalPrice }} руб.</strong></p>
          </div>

          <!-- Сообщение, если корзина пуста -->
          <div v-if="cart.length === 0" class="alert alert-info d-none d-md-block">
            Корзина пуста. Добавьте книги из каталога!
          </div>
        </div>
      `
    });

    // Монтируем приложение в элемент #app — это ключевая строка!
    app.mount('#app');
  </script>
</body>
</html>
